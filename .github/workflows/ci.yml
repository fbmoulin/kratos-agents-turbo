name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          pip install ruff==0.13.1

      - name: Prepare local env
        run: cp .env.example .env

      - name: Lint
        run: ruff check src tests scripts .github

      - name: Compile
        run: python -m compileall src tests scripts

      - name: Verify repo migrations
        run: python scripts/verify_repo_migrations.py --repo-only

      - name: Test
        run: pytest -q

      - name: Compose config
        run: docker compose config

      - name: Import smoke
        run: python -c "import pathlib, sys; sys.path.insert(0, str(pathlib.Path('.').resolve())); import src.api.main, src.worker.tasks, src.mcp.server; print('imports-ok')"

      - name: Docker build
        run: docker build . -t kratos-agents-turbo-ci

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?sslmode=disable
      SUPABASE_DB_URL: postgresql://postgres:postgres@localhost:5432/postgres?sslmode=disable
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_BACKEND_URL: redis://localhost:6379/1
      REDIS_URL: redis://localhost:6379/0
      RUN_INTEGRATION_TESTS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Wait for services and apply repo migrations
        run: |
          python - <<'PY'
          import os
          import time

          import psycopg
          import redis

          db_url = os.environ["DATABASE_URL"]
          redis_url = os.environ["REDIS_URL"]

          last_exc = None
          for _ in range(30):
              try:
                  redis.Redis.from_url(
                      redis_url,
                      socket_connect_timeout=5,
                      socket_timeout=5,
                  ).ping()
                  with psycopg.connect(db_url) as conn:
                      conn.execute("select 1")
                  break
              except Exception as exc:
                  last_exc = exc
                  time.sleep(2)
          else:
              raise last_exc

          print("integration services ready")
          PY
          python scripts/apply_repo_migrations.py
          python scripts/verify_repo_migrations.py

      - name: Integration tests
        run: pytest -q tests/integration
