name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff==0.13.1

      - name: Prepare local env
        run: cp .env.example .env

      - name: Lint
        run: ruff check src tests

      - name: Compile
        run: python -m compileall src tests

      - name: Test
        run: pytest -q

      - name: Compose config
        run: docker compose config

      - name: Import smoke
        run: python -c "import pathlib, sys; sys.path.insert(0, str(pathlib.Path('.').resolve())); import src.api.main, src.worker.tasks, src.mcp.server; print('imports-ok')"

      - name: Docker build
        run: docker build . -t kratos-agents-turbo-ci
