name: Criminal Advocacy Evaluation

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum number of cases to evaluate"
        required: false
        default: "10"
      piece_types:
        description: "Optional comma-separated piece types"
        required: false
        default: ""

jobs:
  evaluate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?sslmode=disable
      SUPABASE_DB_URL: postgresql://postgres:postgres@localhost:5432/postgres?sslmode=disable
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_BACKEND_URL: redis://localhost:6379/1
      REDIS_URL: redis://localhost:6379/0
      RUN_INTEGRATION_TESTS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff==0.13.1

      - name: Prepare local env
        run: cp .env.example .env

      - name: Wait for services and apply repo migrations
        run: |
          python - <<'PY'
          import os
          import time

          import psycopg
          import redis

          db_url = os.environ["DATABASE_URL"]
          redis_url = os.environ["REDIS_URL"]

          last_exc = None
          for _ in range(30):
              try:
                  redis.Redis.from_url(
                      redis_url,
                      socket_connect_timeout=5,
                      socket_timeout=5,
                  ).ping()
                  with psycopg.connect(db_url) as conn:
                      conn.execute("select 1")
                  break
              except Exception as exc:
                  last_exc = exc
                  time.sleep(2)
          else:
              raise last_exc

          print("evaluation services ready")
          PY
          python scripts/apply_repo_migrations.py
          python scripts/verify_repo_migrations.py

      - name: Run offline evaluation checks
        run: |
          python -m pytest tests/test_criminal_advocacy_dataset.py tests/test_criminal_advocacy_eval_harness.py tests/test_criminal_advocacy_reporting.py tests/test_criminal_advocacy_thresholds.py -q

      - name: Evaluate dataset through runtime
        shell: bash
        run: |
          mkdir -p runtime
          PIECE_ARGS=()
          if [ -n "${{ github.event.inputs.piece_types }}" ]; then
            IFS=',' read -ra PIECES <<< "${{ github.event.inputs.piece_types }}"
            for piece in "${PIECES[@]}"; do
              trimmed="$(echo "$piece" | xargs)"
              if [ -n "$trimmed" ]; then
                PIECE_ARGS+=("--piece-type" "$trimmed")
              fi
            done
          fi
          python scripts/evaluate_criminal_advocacy_dataset.py \
            --limit "${{ github.event.inputs.limit }}" \
            "${PIECE_ARGS[@]}" \
            --output runtime/criminal-advocacy-report.json \
            --markdown-output runtime/criminal-advocacy-report.md

      - name: Apply threshold gate
        id: threshold_gate
        continue-on-error: true
        run: |
          python scripts/check_criminal_advocacy_thresholds.py \
            runtime/criminal-advocacy-report.json \
            --output runtime/criminal-advocacy-thresholds.json

      - name: Upload evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criminal-advocacy-evaluation
          path: |
            runtime/criminal-advocacy-report.json
            runtime/criminal-advocacy-report.md
            runtime/criminal-advocacy-thresholds.json

      - name: Fail if threshold gate did not pass
        if: steps.threshold_gate.outcome == 'failure'
        run: |
          echo "Criminal advocacy evaluation did not satisfy thresholds."
          exit 1
