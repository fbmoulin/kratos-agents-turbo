services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    command: sh -c "uvicorn src.api.main:app --host ${API_HOST:-0.0.0.0} --port ${API_PORT:-8000}"
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./runtime:/app/runtime
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build: .
    command: sh -c "celery -A src.worker.celery_app.celery_app worker --loglevel=info -Q ${CELERY_DESPACHO_QUEUE:-legal-despacho},${CELERY_DECISAO_QUEUE:-legal-decisao},${CELERY_TASK_QUEUE:-legal-tasks}"
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ./runtime:/app/runtime

  mcp:
    build: .
    command: uvicorn src.mcp.server:app --host 0.0.0.0 --port 8001
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8001:8001"
